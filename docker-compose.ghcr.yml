services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/maotek/bunqhackathon-backend:latest}
    pull_policy: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/maotek/bunqhackathon-frontend:latest}
    pull_policy: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
